<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定玖的作品集</title>

  <!-- 1. 自动解析 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- 2. 自动生成左侧目录（tocbot）-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tocbot/dist/tocbot.css">
  <script src="https://cdn.jsdelivr.net/npm/tocbot/dist/tocbot.min.js"></script>

  <!-- 3. 极简样式（jekyll-theme-minimal 风格）-->
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
      line-height:1.7;
      background:#fff;
      display:flex;
    }
    /* 左侧目录容器 */
    #toc{
      position:fixed;
      width:260px;
      height:100vh;
      padding:2rem 1rem;
      border-right:1px solid #eee;
      background:#fff;
      overflow-y:auto;
    }
    /* 右侧内容 */
    #content{
      margin-left:280px;
      max-width:800px;
      padding:3rem 2rem;
      width:100%;
    }
    /* 标题样式 */
    h1,h2,h3{margin-top:2rem;margin-bottom:1rem;font-weight:600}
    h1{font-size:2rem;border-bottom:1px solid #eee;padding-bottom:1rem}
    h2{font-size:1.5rem}
    p{color:#333}
    a{color:#0366d6;text-decoration:none}
    ul,ol{padding-left:1.5rem}
    blockquote{border-left:3px solid #eee;padding-left:1rem;color:#666}

    /* 手机端隐藏侧边栏 */
    @media(max-width:900px){
      #toc{display:none}
      #content{margin-left:0;padding:2rem 1rem}
    }
  </style>
</head>

<body>

  <!-- 左侧目录（自动生成） -->
  <div id="toc"></div>

  <!-- 右侧内容（自动加载 MD） -->
  <div id="content"></div>

  <script>
    // 1. 加载你的 content.md 文件
    fetch('content.md')
      .then(res => res.text())
      .then(markdown => {
        // 2. 渲染 MD 到页面
        document.getElementById('content').innerHTML = marked.parse(markdown);
        // 3. 自动生成左侧目录
        tocbot.init({
          tocSelector: '#toc',
          contentSelector: '#content',
          headingSelector: 'h1, h2, h3',
          collapseDepth: 6,
          activeLinkClass: 'is-active-link'
        });
      });
  </script>

</body>
</html>
